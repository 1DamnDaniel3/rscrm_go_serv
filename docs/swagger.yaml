info:
  contact: {}
paths:
  /api/attendances/generate:
    post:
      consumes:
      - application/json
      description: Посещаемость по group_id и lesson_id. Генерирует посещаемость в
        момент вызова.
      parameters:
      - description: Данные для генерации
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/attendancehandlers.GenerateAttendanceInputDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/attendancehandlers.GenerateAttendanceOutputDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: GenerateAttendancies
      tags:
      - Attendaces
  /api/attendances/mark/{attendanceID}:
    patch:
      consumes:
      - application/json
      description: Отметка посещаемости absent <-> presence. Преподу доступны отметки
        только своих занятий.
      parameters:
      - description: id посещения для отметки attendanceID
        format: int64
        in: path
        name: input
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AttendanceResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: MarkAttendances
      tags:
      - Attendaces
  /api/auth/check:
    get:
      consumes:
      - application/json
      description: По токену ищется актуальная инфа пользователя из БД.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/userhandlers.GetMeResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Инфа аккаунта пользователя
      tags:
      - Auth
  /api/clients/{id}/groups:
    get:
      consumes:
      - application/json
      description: Позволяет получить все группы, в которых состоит клиент
      parameters:
      - description: client_id
        format: int64
        in: path
        name: input
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/clienthandlers.GetGroupsRequestDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: GetClientGroups
      tags:
      - Clients
  /api/clients/{id}/students:
    get:
      consumes:
      - application/json
      description: Позволяет получить всех студентов клиента
      parameters:
      - description: client_id
        format: int64
        in: path
        name: input
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/clienthandlers.GetClientStudentsHandlerResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: GetClientStudents
      tags:
      - Clients
  /api/clients/createandgroup:
    post:
      consumes:
      - application/json
      description: Позволяет получить сгруппированных лидов школы
      parameters:
      - description: 'Фильтры: group_id и school_id(из токена авто)'
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/clienthandlers.%D0%A1reateGroupedClientInputDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ClientResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Createandgroup
      tags:
      - Clients
  /api/clients/search:
    get:
      consumes:
      - application/json
      description: Через ?q= параметр получить clients
      parameters:
      - description: q - QueryParameter
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/clienthandlers.ClientSearchHandlerDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Search
      tags:
      - Clients
  /api/leads/createandgroup:
    post:
