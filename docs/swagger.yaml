        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: LeadsAndGroups
      tags:
      - Leads
  /api/leads/groupedclients:
    post:
      consumes:
      - application/json
      description: Позволяет получить сгруппированных лидов школы
